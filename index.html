<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кліки — Трекер (Робочі Періоди)</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0faf0; --surface: #ffffff; --surface2: #e8f7e8; --border: #b8e0b8;
    --green: #4caf50; --green-dim: #c8eac8; --green-dark: #2e7d32;
    --gold: #f57f17; --text: #1a2e1a; --muted: #5a7a5a;
    --weekend: #f5f5f5; --weekend-text: #aaaaaa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; padding: 24px 16px 60px; }
  .wrap { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; }
  .header { margin-bottom: 24px; border-left: 4px solid var(--green); padding-left: 16px; }
  .header h1 { font-family: 'Unbounded', sans-serif; font-size: 22px; font-weight: 900; color: var(--green-dark); }
  .rate-bar { display: flex; align-items: center; gap: 12px; margin-top: 10px; font-size: 12px; }
  .settings { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
  .setting-box { flex: 1; min-width: 200px; background: var(--surface); border: 1px solid var(--border); border-top: 3px solid var(--green); border-radius: 10px; padding: 12px; }
  .setting-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 11px; }
  .setting-row input { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: 4px; width: 100px; }
  .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .month-nav button { background: var(--surface); border: 1px solid var(--border); width: 40px; height: 40px; border-radius: 8px; cursor: pointer; }
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--green); padding: 12px; color: white; font-size: 11px; text-transform: uppercase; }
  td { padding: 10px; font-size: 13px; text-align: center; border-bottom: 1px solid var(--border); }
  .shift-day { background: #fffde7 !important; font-style: italic; } /* Підсвітка перенесеного дня */
  .clicks-input { width: 70px; text-align: center; border: 1px solid var(--border); border-radius: 4px; padding: 3px; font-weight: bold; }
  .zl-cell { color: var(--green-dark); font-weight: 700; }
  .usd-cell { color: var(--gold); font-weight: 700; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Кліки <span id="title-name">—</span></h1>
    <div class="rate-bar" id="rate-display">Завантаження курсу...</div>
  </div>

  <div class="settings">
    <div class="setting-box">
      <div class="setting-row"><label>Ім'я:</label><input type="text" id="name-p1" oninput="updateName()"></div>
      <div class="setting-row"><label>zł/клік:</label><input type="number" id="rate-p1" value="0.20" step="0.01" oninput="render()"></div>
    </div>
  </div>

  <div class="month-nav">
    <button id="prev-month">‹</button>
    <div id="month-label" style="font-weight:bold"></div>
    <button id="next-month">›</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr><th>Дата</th><th>Кліки</th><th>zł</th><th>$</th></tr></thead>
      <tbody id="table-body"></tbody>
      <tfoot id="table-foot"></tfoot>
    </table>
  </div>
  <p style="font-size: 10px; color: grey; margin-top: 10px;">* Жовтим виділено останній день попереднього місяця, що належить до цього періоду.</p>
</div>

<script>
let currentYear = 2026, currentMonth = 3, exchangeRate = 0.26;
const MONTHS = ['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];

function updateName() {
  localStorage.setItem('kliky_name', document.getElementById('name-p1').value);
  document.getElementById('title-name').textContent = document.getElementById('name-p1').value || '—';
}

async function fetchRate() {
  try {
    const r = await fetch('https://api.frankfurter.app/latest?from=PLN&to=USD');
    const d = await r.json(); exchangeRate = d.rates.USD;
    document.getElementById('rate-display').textContent = `Курс: 1 zł = ${exchangeRate.toFixed(4)} USD`;
    render();
  } catch { document.getElementById('rate-display').textContent = `Курс (резерв): 0.26`; }
}

function render() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  document.getElementById('month-label').textContent = `${MONTHS[currentMonth]} ${currentYear}`;
  
  const rate = parseFloat(document.getElementById('rate-p1').value) || 0;
  let totC = 0, totZ = 0;

  // 1. Додаємо останній день ПОПЕРЕДНЬОГО місяця
  const prevDate = new Date(currentYear, currentMonth, 0);
  addTableRow(prevDate.getFullYear(), prevDate.getMonth(), prevDate.getDate(), true);

  // 2. Додаємо дні поточного місяця (КРІМ ОСТАННЬОГО)
  const lastDayThisMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  for (let d = 1; d < lastDayThisMonth; d++) {
    addTableRow(currentYear, currentMonth, d, false);
  }

  function addTableRow(y, m, d, isShifted) {
    const key = `k_${y}_${m}_${d}`;
    const val = localStorage.getItem(key) || '';
    const zl = val ? val * rate : 0;
    totC += Number(val); totZ += zl;

    const tr = document.createElement('tr');
    if (isShifted) tr.classList.add('shift-day');
    tr.innerHTML = `
      <td>${d}.${m+1}</td>
      <td><input class="clicks-input" type="number" value="${val}" onchange="localStorage.setItem('${key}', this.value); render()"></td>
      <td class="zl-cell">${zl.toFixed(2)}</td>
      <td class="usd-cell">${(zl * exchangeRate).toFixed(2)}</td>
    `;
    tbody.appendChild(tr);
  }

  document.getElementById('table-foot').innerHTML = `<tr><td>РАЗОМ</td><td>${totC}</td><td>${totZ.toFixed(2)}</td><td>${(totZ * exchangeRate).toFixed(2)}</td></tr>`;
}

document.getElementById('prev-month').onclick = () => { currentMonth--; if(currentMonth<0){currentMonth=11; currentYear--;} render(); };
document.getElementById('next-month').onclick = () => { currentMonth++; if(currentMonth>11){currentMonth=0; currentYear++;} render(); };

window.onload = () => {
  document.getElementById('name-p1').value = localStorage.getItem('kliky_name') || '';
  updateName(); fetchRate(); render();
};
</script>
</body>
</html>
