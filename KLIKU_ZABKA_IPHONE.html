<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кліки — Трекер</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0faf0;
    --surface: #ffffff;
    --surface2: #e8f7e8;
    --border: #b8e0b8;
    --green: #4caf50;
    --green-dim: #c8eac8;
    --green-dark: #2e7d32;
    --gold: #f57f17;
    --text: #1a2e1a;
    --muted: #5a7a5a;
    --weekend: #f5f5f5;
    --weekend-text: #aaaaaa;
    --accent: #66bb6a;
    --accent2: #a5d6a7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 36px 36px; opacity: 0.4; pointer-events: none; z-index: 0;
  }
  .wrap { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; }

  /* Header */
  .header { margin-bottom: 24px; border-left: 4px solid var(--green); padding-left: 16px; }
  .header h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(18px, 4vw, 26px); font-weight: 900;
    color: var(--green-dark);
  }
  .header h1 span { color: var(--green); }
  .rate-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 10px; }
  .rate-pill {
    background: var(--green-dim); border: 1px solid var(--green);
    border-radius: 6px; padding: 5px 12px; font-size: 12px;
    color: var(--green-dark); display: flex; align-items: center; gap: 8px;
  }
  .rate-pill .dot { width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite; }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .rate-status { font-size: 11px; color: var(--muted); }

  /* Settings */
  .settings { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
  .setting-box {
    flex: 1; min-width: 200px;
    background: var(--surface); border: 1px solid var(--border);
    border-top: 3px solid var(--green);
    border-radius: 10px; padding: 12px 16px;
    box-shadow: 0 2px 8px rgba(76,175,80,0.08);
  }
  .box-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green-dark); margin-bottom: 10px; }
  .setting-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .setting-row:last-child { margin-bottom: 0; }
  .setting-row label { font-size: 11px; color: var(--muted); white-space: nowrap; min-width: 110px; }
  .setting-row input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; color: var(--green-dark);
    font-family: inherit; font-size: 13px; font-weight: 600;
    width: 110px; padding: 4px 8px; outline: none; transition: border-color .2s;
  }
  .setting-row input:focus { border-color: var(--green); }

  /* Month nav */
  .month-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .month-nav button {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--green-dark); font-family: inherit; font-size: 18px;
    width: 36px; height: 36px; border-radius: 8px;
    cursor: pointer; transition: all .2s;
    box-shadow: 0 1px 4px rgba(76,175,80,0.1);
  }
  .month-nav button:hover { background: var(--green); color: white; border-color: var(--green); }
  .month-label {
    font-family: 'Unbounded', sans-serif; font-size: 15px; font-weight: 700;
    color: var(--green-dark); min-width: 160px; text-align: center;
  }

  /* Table */
  .table-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    box-shadow: 0 4px 20px rgba(76,175,80,0.1);
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--green); padding: 12px 10px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    color: white; text-transform: uppercase;
    border-bottom: 2px solid var(--green-dark); text-align: center;
  }
  thead th:first-child { text-align: left; padding-left: 16px; }

  tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
  tbody tr:nth-child(even):not(.weekend-row) { background: var(--surface2); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover:not(.weekend-row) { background: #d4edda; }

  td { padding: 9px 10px; font-size: 13px; text-align: center; vertical-align: middle; }
  td.date-cell { text-align: left; padding-left: 16px; white-space: nowrap; }
  .date-main { font-size: 13px; font-weight: 600; color: var(--text); }
  .date-day  { font-size: 10px; color: var(--muted); margin-left: 5px; }

  .weekend-row td { background: var(--weekend) !important; }
  .weekend-row .date-main { color: var(--weekend-text); }
  .weekend-badge {
    font-size: 10px; letter-spacing: 0.1em; color: #bbb;
    padding: 3px 12px; background: #eeeeee; border-radius: 4px; display: inline-block;
  }

  .clicks-input {
    background: white; border: 1.5px solid var(--border);
    font-family: inherit; font-size: 13px; font-weight: 700;
    color: var(--green-dark); width: 80px; text-align: center;
    border-radius: 6px; padding: 4px 6px; outline: none; transition: border-color .2s, box-shadow .2s;
  }
  .clicks-input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(76,175,80,0.15); }
  .clicks-input::placeholder { color: #ccc; font-weight: 400; }

  .zl-cell  { color: var(--green-dark); font-weight: 700; }
  .usd-cell { color: var(--gold); font-weight: 700; }
  .em       { color: #ccc; }

  /* Totals */
  tfoot { border-top: 2px solid var(--green); }
  tfoot td {
    background: var(--green-dim); padding: 12px 10px;
    font-weight: 700; font-size: 13px; text-align: center;
  }
  tfoot td:first-child {
    font-size: 11px; letter-spacing: 0.08em; color: var(--green-dark);
    text-transform: uppercase; padding-left: 16px; text-align: left;
  }

  /* Actions */
  .actions { margin-top: 18px; display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    background: white; border: 1.5px solid var(--border);
    color: var(--muted); font-family: inherit; font-size: 12px;
    padding: 9px 18px; border-radius: 8px; cursor: pointer; transition: all .2s;
  }
  .btn:hover { border-color: var(--green); color: var(--green-dark); }
  .btn.primary {
    border-color: var(--green); color: white;
    background: var(--green); font-weight: 700;
  }
  .btn.primary:hover { background: var(--green-dark); border-color: var(--green-dark); }

  .footer-note { margin-top: 22px; font-size: 10px; color: var(--muted); text-align: center; letter-spacing: 0.05em; }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h1>Кліки <span id="title-name">—</span> Трекер</h1>
    <div class="rate-bar">
      <div class="rate-pill"><span class="dot"></span><span id="rate-display">завантаження...</span></div>
      <span class="rate-status" id="rate-status"></span>
    </div>
  </div>

  <div class="settings">
    <div class="setting-box">
      <div class="box-label">Налаштування</div>
      <div class="setting-row">
        <label>Ім'я</label>
        <input type="text" id="name-p1" placeholder="Введи ім'я" oninput="updateName()">
      </div>
      <div class="setting-row">
        <label>Ставка (zł/клік)</label>
        <input type="number" id="rate-p1" value="0.20" step="0.01" min="0.01">
      </div>
    </div>
    <div class="setting-box">
      <div class="box-label">Курс валют</div>
      <div class="setting-row">
        <label>PLN/USD (ручний)</label>
        <input type="number" id="manual-rate" step="0.0001" placeholder="авто">
      </div>
    </div>
  </div>

  <div class="month-nav">
    <button id="prev-month">‹</button>
    <div class="month-label" id="month-label"></div>
    <button id="next-month">›</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Дата</th>
          <th>Кліки</th>
          <th>Злоті (zł)</th>
          <th>Долари ($)</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
      <tfoot id="table-foot"></tfoot>
    </table>
  </div>

  <div class="actions">
    <button class="btn primary" onclick="exportCSV()">⬇ Зберегти CSV</button>
    <button class="btn" onclick="clearMonth()">✕ Очистити місяць</button>
  </div>

  <div class="footer-note">Курс PLN/USD оновлюється автоматично · Дані зберігаються в браузері</div>
</div>

<script>
const MONTHS_UA = ['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
const DAYS_UA   = ['Нд','Пн','Вт','Ср','Чт','Пт','Сб'];

let exchangeRate = 0.2691;
let currentYear  = 2026;
let currentMonth = 3;

function getName() {
  const v = document.getElementById('name-p1').value.trim();
  return v || '—';
}
function updateName() {
  localStorage.setItem('kliky1_name', document.getElementById('name-p1').value);
  document.getElementById('title-name').textContent = getName();
  render();
}

function storageKey(y, m) { return `kliky1_${y}_${m}`; }
function loadData(y, m)   { try { return JSON.parse(localStorage.getItem(storageKey(y,m)) || '{}'); } catch { return {}; } }
function saveData(y, m, d){ localStorage.setItem(storageKey(y,m), JSON.stringify(d)); }

async function fetchRate() {
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 5000);
    const r = await fetch('https://api.frankfurter.app/latest?from=PLN&to=USD', { signal: controller.signal });
    clearTimeout(timeout);
    const d = await r.json();
    exchangeRate = d.rates.USD;
    document.getElementById('rate-display').textContent = `1 zł = ${exchangeRate.toFixed(4)} USD`;
    document.getElementById('rate-status').textContent  = `Оновлено: ${new Date().toLocaleTimeString('uk-UA')}`;
    render();
  } catch {
    document.getElementById('rate-display').textContent = `1 zł = ${exchangeRate.toFixed(4)} USD (резерв)`;
    document.getElementById('rate-status').textContent  = 'Офлайн — резервний курс';
  }
}

function getEffectiveRate() {
  const v = parseFloat(document.getElementById('manual-rate').value);
  return (v && v > 0) ? v : exchangeRate;
}

function daysInMonth(y, m) { return new Date(y, m+1, 0).getDate(); }

function render() {
  const y = currentYear, m = currentMonth;
  document.getElementById('month-label').textContent = `${MONTHS_UA[m]} ${y}`;
  const data = loadData(y, m);
  const rate  = parseFloat(document.getElementById('rate-p1').value) || 0.20;
  const rateU = getEffectiveRate();
  const days  = daysInMonth(y, m);
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  let totC=0, totZ=0, totU=0;

  for (let d = 1; d <= days; d++) {
    const dow = new Date(y, m, d).getDay();
    const weekend = dow === 6;
    const dateStr = `${String(d).padStart(2,'0')}.${String(m+1).padStart(2,'0')}.${y}`;
    const cR = data[d] !== undefined ? data[d] : '';
    const c  = cR !== '' ? parseFloat(cR) : null;
    const zl = c !== null ? c * rate : null;
    const us = zl !== null ? zl * rateU : null;

    if (c !== null) { totC += c; totZ += zl; totU += us; }

    const tr = document.createElement('tr');
    if (weekend) tr.classList.add('weekend-row');

    if (weekend) {
      tr.innerHTML = `
        <td class="date-cell"><span class="date-main">${dateStr}</span><span class="date-day">${DAYS_UA[dow]}</span></td>
        <td colspan="3"><span class="weekend-badge">ВИХІДНИЙ</span></td>`;
    } else {
      tr.innerHTML = `
        <td class="date-cell"><span class="date-main">${dateStr}</span><span class="date-day">${DAYS_UA[dow]}</span></td>
        <td><input class="clicks-input" type="number" min="0" placeholder="—" value="${cR}" data-day="${d}" onchange="onClickChange(this)"></td>
        <td class="${zl!==null?'zl-cell':'em'}">${zl!==null?zl.toFixed(2)+' zł':'—'}</td>
        <td class="${us!==null?'usd-cell':'em'}">${us!==null?'$'+us.toFixed(2):'—'}</td>`;
    }
    tbody.appendChild(tr);
  }

  document.getElementById('table-foot').innerHTML = `
    <tr>
      <td>Разом</td>
      <td style="color:var(--green-dark)">${totC.toLocaleString('uk-UA')}</td>
      <td style="color:var(--green-dark)">${totZ.toFixed(2)} zł</td>
      <td style="color:var(--gold)">$${totU.toFixed(2)}</td>
    </tr>`;
}

function onClickChange(input) {
  const y=currentYear, m=currentMonth;
  const data=loadData(y,m);
  const day=parseInt(input.dataset.day);
  const val=input.value.trim();
  if(val==='') delete data[day]; else data[day]=parseFloat(val);
  saveData(y,m,data);
  render();
}

document.getElementById('prev-month').onclick=()=>{currentMonth--;if(currentMonth<0){currentMonth=11;currentYear--;}render();};
document.getElementById('next-month').onclick=()=>{currentMonth++;if(currentMonth>11){currentMonth=0;currentYear++;}render();};
['rate-p1','manual-rate'].forEach(id=>document.getElementById(id).addEventListener('input',render));

function clearMonth(){
  if(!confirm('Очистити всі кліки за цей місяць?'))return;
  localStorage.removeItem(storageKey(currentYear,currentMonth));
  render();
}

function exportCSV(){
  const y=currentYear, m=currentMonth;
  const data=loadData(y,m);
  const rate=parseFloat(document.getElementById('rate-p1').value)||0.20;
  const rU=getEffectiveRate();
  const name=getName();
  const days=daysInMonth(y,m);
  let csv=`Дата,День,Кліки ${name},Злоті (zł),Долари ($)\n`;
  for(let d=1;d<=days;d++){
    const dow=new Date(y,m,d).getDay();
    const dateStr=`${String(d).padStart(2,'0')}.${String(m+1).padStart(2,'0')}.${y}`;
    if(dow===6){csv+=`${dateStr},${DAYS_UA[dow]},ВИХІДНИЙ,,\n`;continue;}
    const c=data[d]!==undefined?data[d]:'';
    const zl=c!==''?(c*rate).toFixed(2):'';
    const us=c!==''?(c*rate*rU).toFixed(2):'';
    csv+=`${dateStr},${DAYS_UA[dow]},${c},${zl},${us}\n`;
  }
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`kliky_${name}_${MONTHS_UA[m]}_${y}.csv`;a.click();
}

window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('kliky1_name') || '';
  document.getElementById('name-p1').value = saved;
  document.getElementById('title-name').textContent = saved || '—';
  // Render immediately with fallback rate, then fetch in background
  render();
  fetchRate();
  setInterval(fetchRate, 30*60*1000);
});
</script>
</body>
</html>
